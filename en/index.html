<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #eaf6ff; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; display: flex; justify-content: center; }
  .frame { width: 100%; max-width: 480px; position: relative; background: url("img/bg.png") center top / 100% auto no-repeat; }
  .frame img { display: block; width: 100%; height: auto; }
  a.link-btn { display: block; }
  a.link-btn:active img { opacity: .7; }
  .fab { position: fixed; z-index: 50; width: 52px; height: 52px; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  #bgm-toggle { right: 14px; bottom: 14px; background: rgba(0,0,0,.55); color: #fff; font-size: 24px; }
  #kakao-share { right: 14px; bottom: 78px; background: #FEE500; }
  #kakao-share svg { width: 26px; height: 26px; }
</style>

<body>
  <div class="frame">
    <img src="img/1.png" alt="새벗 초청예배">
    <img src="img/2.png" alt="일시">
    <img src="img/3.png" alt="순서">
    <img src="img/4.png" alt="초대의 글">
    <a class="link-btn" href="https://www.antiochi.org/ko" target="_blank" rel="noopener"><img src="img/5.png" alt="안디옥교회 홈페이지 바로가기"></a>
  </div>

  <audio id="bgm" src="bgm.mp3" loop preload="auto" playsinline></audio>
  <button id="kakao-share" class="fab" aria-label="카카오톡 공유"><svg viewBox="0 0 24 24" fill="#3C1E1E"><path d="M12 3C6.48 3 2 6.58 2 10.9c0 2.78 1.86 5.22 4.65 6.6-.15.56-.96 3.6-.99 3.83 0 0-.02.17.09.23.11.07.24.01.24.01.32-.04 3.7-2.44 4.28-2.86.55.08 1.13.12 1.73.12 5.52 0 10-3.58 10-7.93C22 6.58 17.52 3 12 3z"/></svg></button>
  <button id="bgm-toggle" class="fab" aria-label="배경음악 켜기/끄기">🔈</button>

  <script>
    (function () {
      var audio = document.getElementById('bgm');
      var btn = document.getElementById('bgm-toggle');
      function icon() { btn.textContent = (!audio.paused && !audio.muted) ? '🔊' : '🔈'; }
      audio.muted = true;
      var k = audio.play(); if (k && k.catch) k.catch(function(){});
      function turnOn() {
        audio.muted = false;
        var p = audio.play();
        if (p && p.then) { p.then(icon).catch(icon); }
        icon();
      }
      function onFirst() {
        turnOn();
        document.removeEventListener('touchend', onFirst);
        document.removeEventListener('click', onFirst);
      }
      document.addEventListener('touchend', onFirst, { passive: true });
      document.addEventListener('click', onFirst);
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (audio.paused || audio.muted) { audio.muted = false; audio.play(); }
        else { audio.pause(); }
        icon();
      });
      icon();
    })();
  </script>

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.7/kakao.min.js" integrity="sha384-tJkjbtDbvoxO+diRuDtwRO9JXR7pjWnfjfRn5ePUpl7e7RJCxKCwwnfqUAdXh53p" crossorigin="anonymous"></script>
  <script>
    var SHARE_URL = 'https://newcomer-june.netlify.app/en/';
    var SHARE_IMG = 'https://newcomer-june.netlify.app/en/img/meta.png';
    try { Kakao.init('ed8f68155ced10fddb02e9773436aa2f'); } catch (e) {}
    document.getElementById('kakao-share').addEventListener('click', function (e) {
      e.stopPropagation();
      if (!window.Kakao || !Kakao.Share) { window.open(SHARE_URL, '_blank'); return; }
      Kakao.Share.sendCustom({ templateId: 134898 });
    });
  </script>
